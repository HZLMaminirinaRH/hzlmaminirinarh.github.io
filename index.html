<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accueil | Projet PJ</title>
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            box-sizing: border-box;
        }

        
        html {
            scroll-behavior: auto;
        }

        .portal-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
            padding: 20px;
        }
        
        .header-nav {
            width: 100%;
            display: flex;
            justify-content: flex-end; 
            padding: 20px 25px; 
            gap: 15px; 
            flex-wrap: wrap; 
        }

        .header-nav a {
            text-decoration: none;
            color: #000;
            font-weight: 600;
            font-size: 0.8em; 
            letter-spacing: 0.5px;
            white-space: nowrap; 
        }

        .login-box {
            width: 100%;
            max-width: 450px;
            text-align: center;
            margin-bottom: 50px;
        }

        .goog-te-banner-frame.skiptranslate, .goog-te-gadget-icon {
            display: none !important;
        }
        body {
            top: 0px !important;
        }
        .goog-tooltip {
            display: none !important;
        }
        .goog-text-highlight {
            background-color: transparent !important;
            border: none !important;
            box-shadow: none !important;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
            border-bottom: 1px solid #000;
            padding: 5px 0;
        }

        .input-group input {
            background: transparent;
            border: none;
            width: 100%;
            padding: 10px 0;
            outline: none;
            color: #000;
        }

        .btn-portal {
            background: linear-gradient(to right, #7292cf, #4a69bd);
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        @media (max-width: 600px) {
            .header-nav {
                justify-content: center;
                padding: 15px;
                gap: 10px;
            }
        }
    </style>
</head>
<body>

    <header class="header-nav notranslate">
        <a href="index.html">HOME</a>
        <a href="about.html">ABOUT</a>
        <a href="service.html">SERVICE</a>
        <a href="contact.html">CONTACT</a>
        <a href="politiques.html">POLITIQUES</a> 
    </header>

    <div class="container portal-container">
        <section class="login-box">
            <h2 style="border:none;">SALAMA!</h2>
            
            <form>
                <div class="input-group">
                    <input type="text" placeholder="Fiantso">
                </div>
                <div class="input-group">
                    <input type="password" placeholder="Teny miafina">
                </div>
                
                <div style="display:flex; justify-content:space-between; align-items: center; font-size:0.8em; margin-top:10px;">
                    <label style="display: flex; align-items: center; gap: 5px;">
                        <input type="checkbox"> Tsarovy
                    </label>
                    <a href="#" style="color:#000; text-decoration:none;">Teny miafina adino ?</a>
                </div>

                <button type="submit" class="btn-portal">NDAO!</button>
                
                <p style="font-size:0.8em; margin-top:20px;">
                    Vaovao ve ? <a href="#" style="font-weight:bold; color:#000; text-decoration:none;">Misoràta eto</a>
                </p>
            </form>
        </section>
    </div>

    <div id="google_translate_element" style="display:none;"></div>

    <script src="script.js"></script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
