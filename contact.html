<!DOCTYPE html>
<html lang="mg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hifandray | Projet PJ</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .contact-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 85vh;
            padding: 20px;
        }

        .contact-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 50px 30px;
            text-align: center;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .contact-item {
            margin: 25px 0;
        }

        .contact-item h3 {
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #005088;
            margin-bottom: 10px;
        }

        .contact-link {
            display: block;
            font-size: 1.1em;
            color: #000;
            text-decoration: none;
            font-weight: 600;
            word-break: break-all;
            transition: color 0.3s;
        }

        .contact-link:hover {
            color: #4a69bd;
        }

        .social-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 25px;
            background: #1877F2; /* Bleu Facebook */
            color: white;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header class="header-nav notranslate">
        <a href="index.html">HOME</a>
        <a href="about.html">ABOUT</a>
        <a href="service.html">SERVICE</a>
        <a href="contact.html">CONTACT</a>
        <a href="politiques.html">POLITIQUES</a> 
    </header>

    <div class="container contact-container">
        <section class="contact-card">
            <h2 style="border:none; margin-bottom: 10px;">Hifandray (Contact)</h2>
            <hr style="width: 50px; border: 2px solid #007bff; margin: 0 auto 30px auto;">

            <div class="contact-item">
                <h3>Mailaka</h3>
                <a href="mailto:hzlmaminirinarh@duck.com" class="contact-link">
                    hzlmaminirinarh@duck.com
                </a>
            </div>

            <div class="contact-item">
                <h3>Facebook</h3>
                <a href="https://web.facebook.com/Hzlmrh/" target="_blank" class="social-btn">
                    Tsidiho ny pejy Facebook
                </a>
            </div>
        </section>
    </div>

    <div id="google_translate_element" style="display:none;"></div>
    <script src="script.js"></script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
