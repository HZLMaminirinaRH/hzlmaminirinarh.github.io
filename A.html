<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accueil | Projet PJ</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Ajustements spécifiques pour reproduire fidèlement la capture a.jpg */
        .portal-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
        }
        
        .header-nav {
            width: 100%;
            display: flex;
            justify-content: flex-end;
            padding: 20px 50px;
            gap: 30px;
        }

        .header-nav a {
            text-decoration: none;
            color: #000;
            font-weight: 600;
            font-size: 0.9em;
            letter-spacing: 1px;
        }

        .login-box {
            width: 100%;
            max-width: 450px;
            text-align: center;
        }

        .input-group {
            text-align: left;
            margin-bottom: 20px;
            border-bottom: 1px solid #000;
            padding: 5px 0;
        }

        .input-group input {
            background: transparent;
            border: none;
            width: 100%;
            padding: 10px 0;
            outline: none;
            color: #000;
        }

        .btn-portal {
            background: linear-gradient(to right, #7292cf, #4a69bd);
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <header class="header-nav">
        <a href="accueil.html">HOME</a>
        <a href="#">ABOUT</a>
        <a href="#">SERVICE</a>
        <a href="#">CONTACT</a>
        <a href="index.html">POLITIQUE</a> </header>

    <div class="container portal-container">
        <section class="login-box">
            <h2 style="border:none;">BIENVENUE</h2>
            
            <form>
                <div class="input-group">
                    <input type="text" placeholder="Nom d'utilisateur">
                </div>
                <div class="input-group">
                    <input type="password" placeholder="Mot de passe">
                </div>
                
                <div style="display:flex; justify-content:space-between; font-size:0.8em; margin-top:10px;">
                    <label><input type="checkbox"> Se souvenir de moi</label>
                    <a href="#" style="color:#000; text-decoration:none;">Mot de passe oublié ?</a>
                </div>

                <button type="submit" class="btn-portal">COMMENCER</button>
                
                <p style="font-size:0.8em; margin-top:20px;">
                    Nouveau ici ? <a href="#" style="font-weight:bold; color:#000; text-decoration:none;">S'enregistrer</a>
                </p>
            </form>
        </section>
    </div>

    <nav>
        <a href="#">Malgache</a> <a href="#">Français</a> <a href="#">English</a> 
        <a href="#">العربية</a> <a href="#">فارسی</a> <a href="#">日本語</a> 
        <a href="#">Español</a> <a href="#">Italiano</a>
    </nav>

</body>
</html>
